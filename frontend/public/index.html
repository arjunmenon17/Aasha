<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aasha — CHW Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'tier-3': '#DC2626',
                        'tier-2': '#EA580C',
                        'tier-1': '#CA8A04',
                        'tier-0': '#16A34A',
                        'bg': '#0F172A',
                        'surface': '#1E293B',
                        'text-primary': '#F1F5F9',
                        'accent': '#3B82F6',
                    }
                }
            }
        }
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script crossorigin src="https://unpkg.com/recharts@2.15.3/umd/Recharts.js"></script>
    <style>
        body { background-color: #0F172A; color: #F1F5F9; font-family: system-ui, -apple-system, sans-serif; margin: 0; }
        .pulse-ring { animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
        @keyframes pulse-ring { 0% { opacity: 0.7; } 50% { opacity: 0.3; } 100% { opacity: 0.7; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        const { useState, useEffect, useCallback } = React;

        // Recharts may or may not have loaded — guard it
        const hasRecharts = typeof Recharts !== 'undefined';
        const RC = hasRecharts ? Recharts : {};

        const API_BASE = '';
        const TIER_NAMES = { 0: 'Normal', 1: 'Watch', 2: 'Concern', 3: 'Emergency' };
        const TIER_BG = { 0: 'bg-green-600', 1: 'bg-yellow-600', 2: 'bg-orange-600', 3: 'bg-red-600' };
        const TIER_TEXT = { 0: 'text-green-500', 1: 'text-yellow-500', 2: 'text-orange-500', 3: 'text-red-500' };
        const TIER_BORDER = { 0: 'border-green-600', 1: 'border-yellow-600', 2: 'border-orange-600', 3: 'border-red-600' };

        function timeAgo(dateStr) {
            if (!dateStr) return 'N/A';
            const diff = Date.now() - new Date(dateStr).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 60) return mins + 'm ago';
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return hrs + 'h ago';
            return Math.floor(hrs / 24) + 'd ago';
        }

        function gestWeeks(gaDays, enrollDate) {
            const daysSince = Math.floor((Date.now() - new Date(enrollDate).getTime()) / 86400000);
            return Math.floor((gaDays + daysSince) / 7);
        }

        function TierBadge({ tier }) {
            return (
                <span className={TIER_BG[tier] + ' text-white text-xs font-bold px-2.5 py-1 rounded-full uppercase tracking-wide'}>
                    {TIER_NAMES[tier]}
                </span>
            );
        }

        function SummaryCards({ summary }) {
            const cards = [
                { label: 'Emergency', count: summary.tier_3, border: TIER_BORDER[3], text: TIER_TEXT[3] },
                { label: 'Concern', count: summary.tier_2, border: TIER_BORDER[2], text: TIER_TEXT[2] },
                { label: 'Watch', count: summary.tier_1, border: TIER_BORDER[1], text: TIER_TEXT[1] },
                { label: 'Normal', count: summary.tier_0, border: TIER_BORDER[0], text: TIER_TEXT[0] },
            ];
            return (
                <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
                    {cards.map(function(c) {
                        return (
                            <div key={c.label} className={'bg-slate-800 rounded-xl p-4 border-l-4 ' + c.border}>
                                <div className={'text-3xl font-bold ' + c.text}>{c.count}</div>
                                <div className="text-sm text-gray-400 mt-1">{c.label}</div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        function PatientList({ patients, onSelect }) {
            return (
                <div className="space-y-2">
                    {patients.map(function(p) {
                        const weeks = gestWeeks(p.gestational_age_at_enrollment, p.enrollment_date);
                        return (
                            <div
                                key={p.id}
                                onClick={function() { onSelect(p.id); }}
                                className="bg-slate-800 rounded-xl p-4 cursor-pointer hover:bg-slate-700 transition-colors flex items-center justify-between"
                            >
                                <div className="flex items-center gap-3">
                                    <TierBadge tier={p.current_risk_tier} />
                                    <div>
                                        <div className="font-semibold text-slate-100">{p.name}</div>
                                        <div className="text-sm text-gray-400">
                                            {p.status === 'postpartum' ? 'Postpartum' : weeks + ' weeks'}
                                            {p.consecutive_misses > 0 ? (
                                                <span className="text-yellow-500 ml-2">
                                                    {'(' + p.consecutive_misses + ' missed)'}
                                                </span>
                                            ) : null}
                                        </div>
                                    </div>
                                </div>
                                <div className="text-sm text-gray-500">
                                    {timeAgo(p.updated_at)}
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        function SymptomChart({ chartData }) {
            if (!hasRecharts || chartData.length === 0) return null;
            return (
                <div className="bg-slate-800 rounded-xl p-4 mb-4">
                    <h3 className="font-bold text-lg mb-3 text-slate-100">Symptom Timeline</h3>
                    <RC.ResponsiveContainer width="100%" height={200}>
                        <RC.LineChart data={chartData}>
                            <RC.CartesianGrid strokeDasharray="3 3" stroke="#334155" />
                            <RC.XAxis dataKey="name" stroke="#94A3B8" fontSize={12} />
                            <RC.YAxis domain={[0, 3]} stroke="#94A3B8" fontSize={12} />
                            <RC.Tooltip
                                contentStyle={{ backgroundColor: '#1E293B', border: 'none', borderRadius: '8px' }}
                                labelStyle={{ color: '#F1F5F9' }}
                            />
                            <RC.Legend />
                            <RC.Line type="monotone" dataKey="wellbeing" stroke="#3B82F6" strokeWidth={2} name="Wellbeing" />
                            <RC.Line type="monotone" dataKey="headache" stroke="#DC2626" strokeWidth={2} name="Headache" />
                        </RC.LineChart>
                    </RC.ResponsiveContainer>
                </div>
            );
        }

        function PatientDetail({ patientId, onBack }) {
            const [detail, setDetail] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(function() {
                fetch(API_BASE + '/api/patients/' + patientId)
                    .then(function(r) { return r.json(); })
                    .then(function(d) { setDetail(d); setLoading(false); })
                    .catch(function(e) { setError(e.message); setLoading(false); });
            }, [patientId]);

            if (loading) return React.createElement('div', {className: 'text-center py-8 text-gray-400'}, 'Loading...');
            if (error) return React.createElement('div', {className: 'text-center py-8 text-red-400'}, 'Error: ' + error);
            if (!detail) return React.createElement('div', {className: 'text-center py-8 text-gray-400'}, 'Patient not found');

            const weeks = gestWeeks(detail.gestational_age_at_enrollment, detail.enrollment_date);
            const assessment = detail.latest_assessment;
            const logs = detail.recent_symptom_logs || [];
            const escalation = detail.active_escalation;

            const chartData = logs.map(function(log, i) {
                return {
                    name: 'Check-in ' + (logs.length - i),
                    wellbeing: parseInt(log.responses && log.responses.wellbeing || '1'),
                    headache: parseInt(log.responses && log.responses.headache_severity || '0'),
                };
            }).reverse();

            var riskFactorBadges = [];
            if (detail.risk_factors) {
                Object.entries(detail.risk_factors).forEach(function(entry) {
                    if (entry[1]) {
                        riskFactorBadges.push(
                            <span key={entry[0]} className="bg-slate-700 text-yellow-500 text-xs px-2 py-1 rounded">
                                {entry[0].replace(/_/g, ' ')}
                            </span>
                        );
                    }
                });
            }

            var actionItems = [];
            if (assessment && assessment.recommended_actions && Array.isArray(assessment.recommended_actions)) {
                actionItems = assessment.recommended_actions;
            }

            var protocolRefs = [];
            if (assessment && assessment.protocol_references && Array.isArray(assessment.protocol_references)) {
                protocolRefs = assessment.protocol_references;
            }

            var uncertaintyItems = [];
            if (assessment && assessment.uncertainty_flags && Array.isArray(assessment.uncertainty_flags)) {
                uncertaintyItems = assessment.uncertainty_flags;
            }

            return (
                <div>
                    <button onClick={onBack} className="text-blue-400 mb-4 flex items-center gap-1 hover:underline text-sm">
                        &#8592; Back to patients
                    </button>

                    <div className="bg-slate-800 rounded-xl p-6 mb-4">
                        <div className="flex items-center justify-between mb-3">
                            <h2 className="text-2xl font-bold text-slate-100">{detail.name}</h2>
                            <TierBadge tier={detail.current_risk_tier} />
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
                            <div>
                                <div className="text-gray-500">Status</div>
                                <div className="text-slate-200 capitalize">{detail.status}</div>
                            </div>
                            <div>
                                <div className="text-gray-500">Gestational Age</div>
                                <div className="text-slate-200">{weeks} weeks</div>
                            </div>
                            <div>
                                <div className="text-gray-500">Check-in Freq</div>
                                <div className="text-slate-200 capitalize">{detail.check_in_frequency}</div>
                            </div>
                            <div>
                                <div className="text-gray-500">Phone</div>
                                <div className="text-slate-200">{detail.phone_number}</div>
                            </div>
                        </div>
                        {riskFactorBadges.length > 0 && (
                            <div className="mt-3">
                                <div className="text-gray-500 text-sm mb-1">Risk Factors</div>
                                <div className="flex gap-2 flex-wrap">{riskFactorBadges}</div>
                            </div>
                        )}
                    </div>

                    {escalation ? (
                        <div className="bg-slate-800 border-l-4 border-red-600 rounded-xl p-4 mb-4">
                            <div className="flex items-center justify-between mb-2">
                                <h3 className="font-bold text-red-500">Active Escalation - Tier {escalation.tier}</h3>
                                <button
                                    onClick={function() {
                                        fetch(API_BASE + '/api/patients/' + patientId + '/resolve', { method: 'POST' })
                                            .then(function() { window.location.reload(); });
                                    }}
                                    className="bg-green-600 text-white px-3 py-1 rounded text-sm hover:opacity-80"
                                >
                                    Resolve
                                </button>
                            </div>
                            <p className="text-sm text-gray-300">{escalation.primary_concern}</p>
                            <div className="grid grid-cols-2 gap-2 mt-2 text-xs text-gray-400">
                                <div>CHW Acknowledged: {escalation.chw_acknowledged_at ? 'Yes' : 'Pending'}</div>
                                <div>Transport: {escalation.transport_confirmed_at ? 'Confirmed' : 'Pending'}</div>
                                <div>Follow-ups: {escalation.follow_up_count}</div>
                                <div>Created: {timeAgo(escalation.created_at)}</div>
                            </div>
                        </div>
                    ) : null}

                    {assessment ? (
                        <div className="bg-slate-800 rounded-xl p-4 mb-4">
                            <h3 className="font-bold text-lg mb-3 text-slate-100">Latest Clinical Assessment</h3>
                            <div className="mb-3">
                                <div className="text-sm text-gray-500">Primary Concern</div>
                                <div className="text-slate-200">{assessment.primary_concern || 'None'}</div>
                            </div>
                            <div className="mb-3">
                                <div className="text-sm text-gray-500">Clinical Reasoning</div>
                                <div className="text-sm text-gray-300">{assessment.clinical_reasoning}</div>
                            </div>
                            {actionItems.length > 0 ? (
                                <div className="mb-3">
                                    <div className="text-sm text-gray-500">Recommended Actions</div>
                                    <ul className="list-disc list-inside text-sm text-gray-300 mt-1">
                                        {actionItems.map(function(a, i) {
                                            return <li key={i}>{a}</li>;
                                        })}
                                    </ul>
                                </div>
                            ) : null}
                            {protocolRefs.length > 0 ? (
                                <div className="mb-3">
                                    <div className="text-sm text-gray-500">Protocol References</div>
                                    {protocolRefs.map(function(ref, i) {
                                        return (
                                            <div key={i} className="bg-slate-700 rounded-lg p-2 mt-1 text-sm">
                                                <div className="font-medium text-blue-400">{ref.source}</div>
                                                <div className="text-gray-400 text-xs">{ref.relevant_finding}</div>
                                            </div>
                                        );
                                    })}
                                </div>
                            ) : null}
                            {uncertaintyItems.length > 0 ? (
                                <div>
                                    <div className="text-sm text-gray-500">Uncertainty Flags</div>
                                    <div className="flex gap-2 flex-wrap mt-1">
                                        {uncertaintyItems.map(function(f, i) {
                                            return <span key={i} className="bg-slate-700 text-yellow-500 text-xs px-2 py-1 rounded">{f}</span>;
                                        })}
                                    </div>
                                </div>
                            ) : null}
                            <div className="text-xs text-gray-500 mt-3">
                                Assessment: {timeAgo(assessment.created_at)}
                            </div>
                        </div>
                    ) : null}

                    <SymptomChart chartData={chartData} />

                    <div className="flex gap-3 mb-6">
                        <button
                            onClick={function() {
                                fetch(API_BASE + '/api/check-in/' + patientId, { method: 'POST' })
                                    .then(function() { alert('Check-in triggered'); });
                            }}
                            className="bg-blue-600 text-white px-4 py-2 rounded-lg hover:opacity-80 text-sm"
                        >
                            Trigger Check-in
                        </button>
                    </div>
                </div>
            );
        }

        function App() {
            const [data, setData] = useState(null);
            const [selectedPatient, setSelectedPatient] = useState(null);
            const [lastRefresh, setLastRefresh] = useState(null);
            const [connected, setConnected] = useState(true);
            const [errMsg, setErrMsg] = useState(null);

            var fetchPatients = useCallback(function() {
                fetch(API_BASE + '/api/patients')
                    .then(function(r) {
                        if (!r.ok) throw new Error('HTTP ' + r.status);
                        return r.json();
                    })
                    .then(function(d) {
                        setData(d);
                        setLastRefresh(new Date());
                        setConnected(true);
                        setErrMsg(null);
                    })
                    .catch(function(e) {
                        setConnected(false);
                        setErrMsg(e.message);
                    });
            }, []);

            useEffect(function() {
                fetchPatients();
                var interval = setInterval(fetchPatients, 30000);
                return function() { clearInterval(interval); };
            }, [fetchPatients]);

            if (!data) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center">
                            <div className="text-3xl font-bold mb-2 text-slate-100">Aasha</div>
                            <div className="text-gray-400">{errMsg ? 'Error: ' + errMsg : 'Connecting to server...'}</div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen max-w-3xl mx-auto px-4 py-6">
                    <div className="flex items-center justify-between mb-6">
                        <div>
                            <h1 className="text-2xl font-bold text-slate-100">Aasha</h1>
                            <div className="text-sm text-gray-400">Maternal Health Surveillance</div>
                        </div>
                        <div className="text-right">
                            <div className="flex items-center gap-2 justify-end">
                                <div className={'w-2 h-2 rounded-full ' + (connected ? 'bg-green-500 pulse-ring' : 'bg-red-500')}></div>
                                <span className="text-xs text-gray-400">{connected ? 'Live' : 'Disconnected'}</span>
                            </div>
                            {lastRefresh ? (
                                <div className="text-xs text-gray-500">
                                    Updated {lastRefresh.toLocaleTimeString()}
                                </div>
                            ) : null}
                        </div>
                    </div>

                    {selectedPatient ? (
                        <PatientDetail
                            patientId={selectedPatient}
                            onBack={function() { setSelectedPatient(null); }}
                        />
                    ) : (
                        <div>
                            <SummaryCards summary={data.summary} />
                            <h2 className="text-lg font-semibold mb-3 text-slate-200">Patients ({data.summary.total})</h2>
                            <PatientList
                                patients={data.patients}
                                onSelect={setSelectedPatient}
                            />
                        </div>
                    )}

                    <div className="fixed bottom-4 right-4">
                        <button
                            onClick={function() {
                                if (confirm('Seed demo data? This will add test patients.')) {
                                    fetch(API_BASE + '/api/demo/seed', { method: 'POST' })
                                        .then(function() { fetchPatients(); });
                                }
                            }}
                            className="bg-slate-700 text-gray-400 px-3 py-2 rounded-lg text-xs hover:bg-slate-600"
                        >
                            Seed Demo Data
                        </button>
                    </div>
                </div>
            );
        }

        var root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
